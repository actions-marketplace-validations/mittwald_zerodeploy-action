name: 'Zero-config deployment to mittwald container hosting'
description: 'Builds and deploys an arbitrary repository as a container into a given mittwald project - Powered mittwald CLI.'

branding:
  icon: 'git-merge'
  color: 'blue'

inputs:
  mittwald-api-token:
    description: 'Mittwald API token for authentication'
    required: true
  mittwald-project-id:
    description: 'Mittwald project ID to deploy to (e.g. p-kpbj8e)'
    required: true
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '24'
  mittwald-cli-version:
    description: 'Version of the mittwald CLI to install (use a semver range)'
    required: false
    default: '^1.17.0'
  repo-subpath:
    description: 'Subpath within the repository to deploy (e.g. ./services/api), relative to the repository root'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    # Phase 1: Environment Setup
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Verify Node.js and npm versions
      shell: bash
      run: |
        echo "Node.js version:"
        node --version
        echo "npm version:"
        npm --version

    # Phase 2: Mittwald CLI & Dependencies
    - name: Install mittwald CLI
      shell: bash
      run: |
        echo "Installing mittwald CLI version ${{ inputs.mittwald-cli-version }}..."
        npm install -g @mittwald/cli@${{ inputs.mittwald-cli-version }}
        echo "Mittwald CLI installed successfully"
        mw --version

    # Phase 3: Railpack Validation
    - name: Install railpack via official installer
      shell: bash
      run: |
        echo "Installing railpack via official installer..."
        # Downloads and executes the official railpack installer script.
        # If a checksum/signature is published upstream, verify it here before executing.
        curl -sSL https://railpack.com/install.sh | sh
        echo "Railpack installed successfully"
        railpack --version

    # Phase 4: Deploy
    - name: Prepare Docker Buildx builder
      shell: bash
      run: |
        echo "Setting up Docker Buildx builder..."
        docker buildx create --use
        echo "✓ Docker Buildx builder created and activated"

    - name: Deploy to Mittwald container hosting
      shell: bash
      env:
        MITTWALD_API_TOKEN: ${{ inputs.mittwald-api-token }}
      run: |
        cd ${{ inputs.repo-subpath }}
        echo "Deploying to Mittwald with project ID: ${{ inputs.mittwald-project-id }}"
        if [ -f "$GITHUB_WORKSPACE/.env" ]; then
          echo "✓ .env file found, including in deployment"
          mw experimental deploy --project-id ${{ inputs.mittwald-project-id }} --env-file=$GITHUB_WORKSPACE/.env
        else
          echo "⚠ No .env file found, deploying without environment file"
          mw experimental deploy --project-id ${{ inputs.mittwald-project-id }}
        fi
